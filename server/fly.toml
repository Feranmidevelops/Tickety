# Fly.io config for the Tickety API.
# If the app name below is taken, change it here AND run `fly apps create <new-name>`.
app = "tickety-api-feranmi"
primary_region = "lhr"   # London — close to Supabase eu-west-1

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080          # matches EXPOSE / ASPNETCORE_URLS in the Dockerfile
  force_https = true
  auto_stop_machines = "stop"   # scale to zero when idle (cheapest); set min below to 1 to avoid cold starts
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
