# Render blueprint for the Tickety API (free tier — no credit card required).
# Deploy: render.com → New → Blueprint → pick the Feranmidevelops/Tickety repo.
# Secrets (sync:false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: tickety-api
    runtime: docker
    rootDir: server
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt          # EU, closest free region to Supabase eu-west-1
    healthCheckPath: /health
    envVars:
      - key: ConnectionStrings__Default
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Seed__AdminEmail
        sync: false
      - key: Seed__AdminPassword
        sync: false
      - key: Email__Username
        sync: false
      - key: Email__Password
        sync: false
      - key: ClientUrl
        sync: false
